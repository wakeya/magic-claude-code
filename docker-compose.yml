services:
  claude_code_proxy_dns:
    build: .
    container_name: claude_code_proxy_dns
    ports:
      - "443:443"
      - "8442:8442"
    volumes:
      - ./data:/app/data
      # Linux/macOS 默认读取 ${HOME}/.claude/projects；Windows 请在 .env 或 PowerShell 中显式设置 CLAUDE_PROJECTS_DIR，例如 C:/Users/用户名/.claude/projects
      - ${CLAUDE_PROJECTS_DIR:-${HOME}/.claude/projects}:/claude-projects:ro
      # 自动同步宿主机时区：通过挂载 /etc/localtime（Linux/macOS/Docker Desktop Windows 自动生效）
      # 如果时区仍不正确，请在 .env 文件中添加 TZ=你的时区，例如 TZ=America/Los_Angeles
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - CLAUDE_PROJECTS_DIR=/claude-projects
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
