name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v0.2.0"
        required: true

jobs:
  release:
    name: Release binaries
    runs-on: euleros-2.10.1
    env:
      PRODUCT_NAME: Magic-Claude-Code
      BINARY_NAME: mcc

    steps:
      - name: 检出代码
        run: |
          set -e
          export GIT_TERMINAL_PROMPT=0

          rm -rf repo_workspace
          if [ -n "${{ secrets.GITCODE_TOKEN }}" ]; then
            git clone "https://x-access-token:${{ secrets.GITCODE_TOKEN }}@gitcode.com/${{ github.repository }}.git" repo_workspace
          else
            git clone "https://gitcode.com/${{ github.repository }}.git" repo_workspace
          fi

          cd repo_workspace
          git fetch --tags origin
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            git checkout "refs/tags/${{ github.event.inputs.tag }}" || {
              echo "ERROR: tag not found: ${{ github.event.inputs.tag }}" >&2
              exit 1
            }
          elif echo "${GITHUB_REF}" | grep -q '^refs/tags/'; then
            git checkout "${GITHUB_REF#refs/tags/}" || {
              echo "ERROR: tag not found: ${GITHUB_REF#refs/tags/}" >&2
              exit 1
            }
          elif [ -n "${GITHUB_SHA}" ]; then
            git checkout "${GITHUB_SHA}"
          fi

      - name: 配置 Go 环境
        run: |
          set -e
          GO_VERSION="$(awk '/^go / {print $2}' repo_workspace/go.mod)"
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64) GO_ARCH="amd64" ;;
            aarch64|arm64) GO_ARCH="arm64" ;;
            *) echo "Unsupported runner architecture for Go: ${ARCH}" >&2; exit 1 ;;
          esac

          curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-${GO_ARCH}.tar.gz" -o /tmp/go.tar.gz
          rm -rf /tmp/go-install
          mkdir -p /tmp/go-install
          tar -C /tmp/go-install -xzf /tmp/go.tar.gz
          export PATH="/tmp/go-install/go/bin:${PATH}"
          if [ -n "${GITHUB_PATH:-}" ]; then
            echo "/tmp/go-install/go/bin" >> "${GITHUB_PATH}"
          fi
          echo "PATH=/tmp/go-install/go/bin:${PATH}" >> "${GITHUB_ENV}"
          go version

      - name: 配置 Node.js 环境
        run: |
          set -e
          ARCH="$(uname -m)"
          case "${ARCH}" in
            x86_64) NODE_ARCH="x64" ;;
            aarch64|arm64) NODE_ARCH="arm64" ;;
            *) echo "Unsupported runner architecture for Node.js: ${ARCH}" >&2; exit 1 ;;
          esac

          NODE_VERSION="$(curl -fsSL https://nodejs.org/dist/index.json | sed -n 's/.*"version":"\(v24\.[^"]*\)".*/\1/p' | head -n 1)"
          if [ -z "${NODE_VERSION}" ]; then
            echo "Failed to resolve latest Node.js v24 release" >&2
            exit 1
          fi

          if ! which xz >/dev/null 2>&1; then
            yum install -y xz || apt-get install -y xz || {
              echo "ERROR: xz is required to extract Node.js but could not be installed" >&2
              exit 1
            }
          fi

          curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-linux-${NODE_ARCH}.tar.xz" -o /tmp/node.tar.xz
          rm -rf /tmp/node-install
          mkdir -p /tmp/node-install
          tar -C /tmp/node-install --strip-components=1 -xJf /tmp/node.tar.xz
          export PATH="/tmp/node-install/bin:${PATH}"
          if [ -n "${GITHUB_PATH:-}" ]; then
            echo "/tmp/node-install/bin" >> "${GITHUB_PATH}"
          fi
          echo "PATH=/tmp/node-install/bin:${PATH}" >> "${GITHUB_ENV}"
          node --version
          npm --version

      - name: 确定 RELEASE_TAG
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: 验证版本号格式
        run: |
          if ! echo "${RELEASE_TAG}" | grep -qE '^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$'; then
            echo "Release tag must look like v0.1.0, got: ${RELEASE_TAG}" >&2
            exit 1
          fi

      - name: 安装 zip 工具
        run: |
          if ! which zip >/dev/null 2>&1; then
            yum install -y zip || apt-get install -y zip || {
              echo "ERROR: zip is required for Windows packages but could not be installed" >&2
              exit 1
            }
          fi

      - name: 安装前端依赖
        run: cd repo_workspace/internal/frontend && npm ci

      - name: 构建前端
        run: cd repo_workspace/internal/frontend && npm run build

      - name: 运行测试
        run: cd repo_workspace && go test ./...

      - name: 构建发布归档
        run: |
          cd repo_workspace
          RELEASE_DIR="dist/release/${RELEASE_TAG}"
          rm -rf "${RELEASE_DIR}"
          mkdir -p "${RELEASE_DIR}"

          build_target() {
            goos="$1"
            goarch="$2"
            platform="$3"
            arch_label="$4"
            format="$5"
            exe_suffix=""

            if [ "${goos}" = "windows" ]; then
              exe_suffix=".exe"
            fi

            package_name="${PRODUCT_NAME}-${RELEASE_TAG}-${platform}-${arch_label}"
            package_dir="${RELEASE_DIR}/${package_name}"
            mkdir -p "${package_dir}"

            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X magic-claude-code/internal/version.Version=${RELEASE_TAG}" \
              -o "${package_dir}/${BINARY_NAME}${exe_suffix}" ./cmd/server

            cp README.md "${package_dir}/README.md"

            if [ "${format}" = "zip" ]; then
              (cd "${RELEASE_DIR}" && zip -qr "${package_name}.zip" "${package_name}")
            else
              tar -C "${RELEASE_DIR}" -czf "${RELEASE_DIR}/${package_name}.tar.gz" "${package_name}"
            fi

            rm -rf "${package_dir}"
          }

          build_target linux amd64 Linux x86_64 tar.gz
          build_target linux arm64 Linux arm64 tar.gz
          build_target darwin amd64 macOS x86_64 tar.gz
          build_target darwin arm64 macOS arm64 tar.gz
          build_target windows amd64 Windows x86_64 zip
          build_target windows arm64 Windows arm64 zip

          (cd "${RELEASE_DIR}" && sha256sum * > SHA256SUMS.txt)

          ARTIFACT_COUNT=$(ls -1 "${RELEASE_DIR}" | wc -l)
          if [ "${ARTIFACT_COUNT}" -ne 7 ]; then
            echo "ERROR: expected 7 artifacts (6 archives + SHA256SUMS.txt), got ${ARTIFACT_COUNT}" >&2
            ls -lh "${RELEASE_DIR}/"
            exit 1
          fi

          echo "=== Build artifacts (${ARTIFACT_COUNT} files) ==="
          ls -lh "${RELEASE_DIR}/"

      - name: 保存产物到临时目录
        run: |
          cp -r repo_workspace/dist/release/${RELEASE_TAG} /tmp/artifacts

      - name: 切换到 main 分支
        run: |
          cd repo_workspace
          git fetch origin main
          git checkout -B main origin/main

      - name: 提交产物到仓库
        run: |
          cd repo_workspace
          mkdir -p dist/release
          rm -rf "dist/release/${RELEASE_TAG}"
          cp -r /tmp/artifacts "dist/release/${RELEASE_TAG}"

          git config user.name "gitcode-ci"
          git config user.email "ci@gitcode.local"
          git add dist/release/
          git commit -m "release: ${RELEASE_TAG} build artifacts" || {
            echo "No changes to commit — artifacts may already exist"
            exit 0
          }
          git push "https://x-access-token:${{ secrets.GITCODE_TOKEN }}@gitcode.com/${{ github.repository }}.git" HEAD:main || {
            echo "Push failed — ensure GITCODE_TOKEN secret is configured with repo write access"
            exit 1
          }
          echo "✅ Build artifacts pushed to dist/release/${RELEASE_TAG}/"

      - name: 创建 GitCode Release
        run: |
          RELEASE_BODY="Magic Claude Code ${RELEASE_TAG} release. 最近更新：修复 Header 版本号刷新后回退为 dev 的问题，版本显示改为始终从 /api/status 获取；新增版本显示回归测试和修复 spec；新增并修复 Gitee ReleasePipeline，支持通过 v* tag push 构建 Linux、macOS、Windows 的 x86_64/arm64 二进制资产；Gitee 发布流水线改为引用 release_token 通用变量，避免 token 明文进入仓库 YAML。Binary archives are available under dist/release/${RELEASE_TAG}/."
          STATUS=$(curl -s -o /tmp/release-response.json -w "%{http_code}" \
            -X POST \
            -H "PRIVATE-TOKEN: ${{ secrets.GITCODE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"tag_name\":\"${RELEASE_TAG}\",\"name\":\"${RELEASE_TAG}\",\"body\":\"${RELEASE_BODY}\"}" \
            "https://api.gitcode.com/api/v5/repos/${{ github.repository }}/releases")

          if [ "${STATUS}" = "409" ] || [ "${STATUS}" = "422" ]; then
            echo "Release already exists for ${RELEASE_TAG} — skipping creation"
          elif [ "${STATUS}" -ge 200 ] && [ "${STATUS}" -lt 300 ]; then
            echo "✅ GitCode Release created for ${RELEASE_TAG}"
          else
            echo "ERROR: Release creation returned ${STATUS} — updater needs a release to detect new versions" >&2
            cat /tmp/release-response.json
            exit 1
          fi
