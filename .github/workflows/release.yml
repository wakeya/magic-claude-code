name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and upload release assets
    runs-on: ubuntu-latest

    env:
      PRODUCT_NAME: Magic-Claude-Code
      BINARY_NAME: mcc
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: internal/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix internal/frontend

      - name: Build frontend
        run: npm run build --prefix internal/frontend

      - name: Run Go tests
        run: go test ./...

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0, got: ${RELEASE_TAG}" >&2
            exit 1
          fi

          rm -rf dist/release
          mkdir -p dist/release

          build_target() {
            local goos="$1"
            local goarch="$2"
            local platform="$3"
            local arch_label="$4"
            local format="$5"
            local exe_suffix=""

            if [[ "${goos}" == "windows" ]]; then
              exe_suffix=".exe"
            fi

            local package_name="${PRODUCT_NAME}-${RELEASE_TAG}-${platform}-${arch_label}"
            local package_dir="dist/release/${package_name}"
            mkdir -p "${package_dir}"

            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w" \
              -o "${package_dir}/${BINARY_NAME}${exe_suffix}" ./cmd/server

            cp README.md "${package_dir}/README.md"

            if [[ "${format}" == "zip" ]]; then
              (cd dist/release && zip -qr "${package_name}.zip" "${package_name}")
            else
              tar -C dist/release -czf "dist/release/${package_name}.tar.gz" "${package_name}"
            fi

            rm -rf "${package_dir}"
          }

          build_target linux amd64 Linux x86_64 tar.gz
          build_target linux arm64 Linux arm64 tar.gz
          build_target darwin amd64 macOS x86_64 tar.gz
          build_target darwin arm64 macOS arm64 tar.gz
          build_target windows amd64 Windows x86_64 zip
          build_target windows arm64 Windows arm64 zip

          (cd dist/release && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/release/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" dist/release/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
