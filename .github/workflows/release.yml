name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and upload release assets
    runs-on: ubuntu-latest

    env:
      PRODUCT_NAME: Magic-Claude-Code
      BINARY_NAME: mcc
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: internal/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix internal/frontend

      - name: Build frontend
        run: npm run build --prefix internal/frontend

      - name: Run Go tests
        run: make test

      - name: Build release archives
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0, got: ${RELEASE_TAG}" >&2
            exit 1
          fi

          rm -rf dist/release
          mkdir -p dist/release

          build_target() {
            local goos="$1"
            local goarch="$2"
            local platform="$3"
            local arch_label="$4"
            local format="$5"
            local exe_suffix=""

            if [[ "${goos}" == "windows" ]]; then
              exe_suffix=".exe"
            fi

            local package_name="${PRODUCT_NAME}-${RELEASE_TAG}-${platform}-${arch_label}"
            local package_dir="dist/release/${package_name}"
            mkdir -p "${package_dir}"

            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X magic-claude-code/internal/version.Version=${RELEASE_TAG}" \
              -o "${package_dir}/${BINARY_NAME}${exe_suffix}" ./cmd/server

            cp README.md "${package_dir}/README.md"
            cp README.en.md "${package_dir}/README.en.md"
            cp scripts/SCRIPTS.md "${package_dir}/SCRIPTS.md"
            cp scripts/SCRIPTS.en.md "${package_dir}/SCRIPTS.en.md"
            # 附带对应平台的宿主机配置脚本：bootstrap 自动配置失败时，
            # 用户可手动运行脚本完成 hosts + CA 配置。脚本含国内镜像 fallback。
            if [[ "${goos}" == "windows" ]]; then
              cp scripts/setup-host.ps1 "${package_dir}/setup-host.ps1"
              cp scripts/start-mcc.ps1 "${package_dir}/start-mcc.ps1"
              cp scripts/stop-mcc.ps1 "${package_dir}/stop-mcc.ps1"
              cp scripts/register-mcc-task.ps1 "${package_dir}/register-mcc-task.ps1"
            else
              cp scripts/setup-host.sh "${package_dir}/setup-host.sh"
              cp scripts/docker-host-helper.sh "${package_dir}/docker-host-helper.sh"
              chmod +x "${package_dir}/setup-host.sh" "${package_dir}/docker-host-helper.sh"
            fi

            if [[ "${format}" == "zip" ]]; then
              (cd dist/release && zip -qr "${package_name}.zip" "${package_name}")
            else
              tar -C dist/release -czf "dist/release/${package_name}.tar.gz" "${package_name}"
            fi

            rm -rf "${package_dir}"
          }

          build_target linux amd64 Linux x86_64 tar.gz
          build_target linux arm64 Linux arm64 tar.gz
          build_target darwin amd64 macOS x86_64 tar.gz
          build_target darwin arm64 macOS arm64 tar.gz
          build_target windows amd64 Windows x86_64 zip
          build_target windows arm64 Windows arm64 zip

          (cd dist/release && sha256sum * > SHA256SUMS.txt)

      - name: Prepare release notes
        shell: bash
        run: |
          NOTES_FILE="sdd-docs/changes/release-notes/${RELEASE_TAG}.md"
          if [[ -f "${NOTES_FILE}" ]]; then
            cp "${NOTES_FILE}" release-notes.md
          else
            PREV_TAG=$(git describe --tags --abbrev=0 "${RELEASE_TAG}^" 2>/dev/null || true)
            if [[ -n "${PREV_TAG}" ]]; then
              echo "## ${RELEASE_TAG} 更新内容" > release-notes.md
              echo "" >> release-notes.md
              git log "${PREV_TAG}..${RELEASE_TAG}" --no-merges --format='- %s' >> release-notes.md
            else
              echo "## ${RELEASE_TAG}" > release-notes.md
            fi
          fi

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --notes-file release-notes.md
            gh release upload "${RELEASE_TAG}" dist/release/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" dist/release/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md
          fi

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: release

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract owner lowercase
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Prepare Docker metadata
        id: docker-meta
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${{ steps.owner.outputs.name }}/magic-claude-code"
          {
            echo "tags<<EOF"
            echo "${image}:${RELEASE_TAG}"
            if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ env.RELEASE_TAG }}
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}
