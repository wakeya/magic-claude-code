version: '1.0'
name: release
displayName: ReleasePipeline
triggers:
  trigger: auto
  push:
    tags:
      prefix:
        - v
variables:
  global:
    - release_token
stages:
  - name: build
    displayName: 构建发布制品
    strategy: fast
    trigger: auto
    executor: []
    steps:
      - step: build@golang
        name: build_release
        displayName: 构建并发布
        golangVersion: 1.16
        commands:
          - set -euo pipefail
          - PRODUCT_NAME="Magic-Claude-Code"
          - BINARY_NAME="mcc"
          - GITEE_REPO_PATH="${GITEE_REPO:-wakeya/magic-claude-code}"
          - ': "${release_token:?ERROR: release_token pipeline variable is required}"'
          - ''
          - '# 获取 tag 名称。GITEE_COMMIT 通常是提交 SHA，不能直接作为版本号。'
          - RELEASE_TAG=""
          - for candidate in "${GITEE_REF:-}" "${GITEE_BRANCH:-}" "${GITEE_COMMIT_REF_NAME:-}" "${CI_COMMIT_TAG:-}"; do
          - '  candidate="${candidate#refs/tags/}"'
          - '  if echo "${candidate}" | grep -qE ''^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$''; then'
          - '    RELEASE_TAG="${candidate}"'
          - '    break'
          - '  fi'
          - done
          - ''
          - if [ -z "${RELEASE_TAG}" ]; then
          - '  RELEASE_TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")'
          - fi
          - ''
          - if [ -z "${RELEASE_TAG}" ]; then
          - '  echo "ERROR: No release tag found. This pipeline must run from a v* tag push." >&2'
          - '  env | sort | grep -E ''^(GITEE|CI)_'' || true'
          - '  exit 1'
          - fi
          - ''
          - '# 验证版本号'
          - if ! echo "${RELEASE_TAG}" | grep -qE '^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$'; then
          - '  echo "ERROR: Invalid tag format: ${RELEASE_TAG}" >&2'
          - '  exit 1'
          - fi
          - ''
          - if command -v apt-get >/dev/null 2>&1; then
          - '  install_pkg() {'
          - '    apt-get update'
          - '    DEBIAN_FRONTEND=noninteractive apt-get install -y "$@"'
          - '  }'
          - '  install_pkg ca-certificates curl tar gzip zip xz-utils'
          - elif command -v yum >/dev/null 2>&1; then
          - '  install_pkg() {'
          - '    yum install -y "$@"'
          - '  }'
          - '  install_pkg ca-certificates curl tar gzip zip xz'
          - else
          - '  echo "ERROR: no supported package manager found" >&2'
          - '  exit 1'
          - fi
          - ''
          - '# 安装基础工具。Gitee 默认 Go 插件镜像可能只有 Go 1.12，不能复用。'
          - missing_tools=""
          - for tool in curl tar gzip zip xz; do
          - '  if ! command -v "${tool}" >/dev/null 2>&1; then'
          - '    missing_tools="${missing_tools} ${tool}"'
          - '  fi'
          - done
          - if [ -n "${missing_tools}" ]; then
          - '  echo "ERROR: required tools are still missing:${missing_tools}" >&2'
          - '  exit 1'
          - fi
          - ''
          - '# 始终安装并优先使用 go.mod 声明的 Go 版本，避免镜像内置旧 Go 版本。'
          - GO_VERSION="$(awk '/^go / {print $2}' go.mod)"
          - ARCH="$(uname -m)"
          - case "${ARCH}" in
          - '  x86_64) GO_ARCH="amd64"; NODE_ARCH="x64" ;;'
          - '  aarch64|arm64) GO_ARCH="arm64"; NODE_ARCH="arm64" ;;'
          - '  *) echo "ERROR: unsupported runner architecture: ${ARCH}" >&2; exit 1 ;;'
          - esac
          - ''
          - rm -rf /tmp/go-install
          - mkdir -p /tmp/go-install
          - curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-${GO_ARCH}.tar.gz" -o /tmp/go.tar.gz
          - tar -C /tmp/go-install -xzf /tmp/go.tar.gz
          - export PATH="/tmp/go-install/go/bin:${PATH}"
          - go version
          - ''
          - '# 始终安装 Node.js 24，确保前端构建环境可重复。'
          - NODE_VERSION="$(curl -fsSL https://nodejs.org/dist/index.json | sed -n 's/.*"version":"\(v24\.[^"]*\)".*/\1/p' | head -n 1)"
          - if [ -z "${NODE_VERSION}" ]; then
          - '  echo "ERROR: failed to resolve latest Node.js v24 release" >&2'
          - '  exit 1'
          - fi
          - rm -rf /tmp/node-install
          - mkdir -p /tmp/node-install
          - curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-linux-${NODE_ARCH}.tar.xz" -o /tmp/node.tar.xz
          - tar -C /tmp/node-install --strip-components=1 -xJf /tmp/node.tar.xz
          - export PATH="/tmp/node-install/bin:${PATH}"
          - node --version
          - npm --version
          - ''
          - '# 构建前端'
          - cd internal/frontend
          - npm ci
          - npm run build
          - cd ../..
          - ''
          - '# 运行测试'
          - go test ./...
          - ''
          - '# 构建发布归档'
          - RELEASE_DIR="dist/release/${RELEASE_TAG}"
          - rm -rf "${RELEASE_DIR}"
          - mkdir -p "${RELEASE_DIR}"
          - ''
          - build_target() {
          - '  goos="$1"; goarch="$2"; platform="$3"; arch_label="$4"; format="$5"'
          - '  exe_suffix=""'
          - '  [ "${goos}" = "windows" ] && exe_suffix=".exe"'
          - ''
          - '  package_name="${PRODUCT_NAME}-${RELEASE_TAG}-${platform}-${arch_label}"'
          - '  package_dir="${RELEASE_DIR}/${package_name}"'
          - '  mkdir -p "${package_dir}"'
          - ''
          - '  GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \'
          - '    go build -trimpath -ldflags="-s -w -X magic-claude-code/internal/version.Version=${RELEASE_TAG}" \'
          - '    -o "${package_dir}/${BINARY_NAME}${exe_suffix}" ./cmd/server'
          - ''
          - '  cp README.md "${package_dir}/README.md"'
          - ''
          - '  if [ "${format}" = "zip" ]; then'
          - '    (cd "${RELEASE_DIR}" && zip -qr "${package_name}.zip" "${package_name}")'
          - '  else'
          - '    tar -C "${RELEASE_DIR}" -czf "${RELEASE_DIR}/${package_name}.tar.gz" "${package_name}"'
          - '  fi'
          - '  rm -rf "${package_dir}"'
          - '}'
          - ''
          - build_target linux amd64 Linux x86_64 tar.gz
          - build_target linux arm64 Linux arm64 tar.gz
          - build_target darwin amd64 macOS x86_64 tar.gz
          - build_target darwin arm64 macOS arm64 tar.gz
          - build_target windows amd64 Windows x86_64 zip
          - build_target windows arm64 Windows arm64 zip
          - ''
          - (cd "${RELEASE_DIR}" && sha256sum * > SHA256SUMS.txt)
          - ''
          - ARTIFACT_COUNT=$(ls -1 "${RELEASE_DIR}" | wc -l)
          - if [ "${ARTIFACT_COUNT}" -ne 7 ]; then
          - '  echo "ERROR: expected 7 artifacts (6 archives + SHA256SUMS.txt), got ${ARTIFACT_COUNT}" >&2'
          - '  ls -lh "${RELEASE_DIR}/"'
          - '  exit 1'
          - fi
          - ''
          - echo "=== Build artifacts ==="
          - ls -lh "${RELEASE_DIR}/"
          - ''
          - '# 提交产物到仓库'
          - git config user.name "gitee-ci"
          - git config user.email "ci@gitee.local"
          - git add dist/release/
          - 'git commit -m "release: ${RELEASE_TAG} build artifacts" || {'
          - '  echo "No changes to commit"'
          - '}'
          - git push "https://wakeya:${release_token}@gitee.com/${GITEE_REPO_PATH}.git" HEAD:main || {
          - '  echo "ERROR: Push failed — ensure release_token pipeline variable is configured" >&2'
          - '  exit 1'
          - '}'
          - ''
          - '# 创建 Gitee Release'
          - RELEASE_BODY="Magic Claude Code ${RELEASE_TAG} release. 最近更新：修复 Header 版本号刷新后回退为 dev 的问题，版本显示改为始终从 /api/status 获取；新增版本显示回归测试和修复 spec；新增并修复 Gitee ReleasePipeline，支持通过 v* tag push 构建 Linux、macOS、Windows 的 x86_64/arm64 二进制资产；Gitee 发布流水线改为引用 release_token 通用变量，避免 token 明文进入仓库 YAML。"
          - STATUS=$(curl -s -o /tmp/release-response.json -w "%{http_code}" \
          - '  -X POST \'
          - '  -H "Authorization: Bearer ${release_token}" \'
          - '  -H "Content-Type: application/json" \'
          - '  -d "{\"tag_name\":\"${RELEASE_TAG}\",\"name\":\"${RELEASE_TAG}\",\"body\":\"${RELEASE_BODY}\"}" \'
          - '  "https://gitee.com/api/v5/repos/${GITEE_REPO_PATH}/releases")'
          - ''
          - if [ "${STATUS}" -ge 200 ] && [ "${STATUS}" -lt 300 ]; then
          - '  echo "Gitee Release created for ${RELEASE_TAG}"'
          - else
          - '  echo "WARNING: Release creation returned ${STATUS}" >&2'
          - '  cat /tmp/release-response.json'
          - fi
          - ''
